<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lyra – prosty czat</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, rgba(56,189,248,0.08), transparent 35%),
                  radial-gradient(circle at 80% 0%, rgba(16,185,129,0.08), transparent 30%),
                  var(--bg);
      color: var(--text);
      font-family: "Inter", "SF Pro Display", system-ui, sans-serif;
      display: flex;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: min(900px, 100%);
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
    }
    h1 { margin: 0 0 10px; font-size: 1.2rem; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    textarea {
      width: 100%;
      min-height: 90px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 10px;
      resize: vertical;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      background: linear-gradient(135deg, #0ea5e9, #22c55e);
      color: #0b1120;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(34,197,94,0.25); }
    .log {
      margin-top: 12px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 12px;
      min-height: 120px;
      font-family: "JetBrains Mono", Consolas, monospace;
      white-space: pre-wrap;
    }
    .nav { margin-bottom: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .nav a {
      text-decoration: none;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .nav a:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <div class="nav">
      <a href="/">Czat</a>
      <a href="/voice.html">Voice UI</a>
      <a href="/remote-camera">Kamera</a>
      <a href="/simple-chat.html">Prosty czat</a>
      <a href="/tts-settings.html">👄 TTS (backend)</a>
      <a href="/app">Nowa strona</a>
    </div>
    <h1>Prosty czat Lyra → /v1/chat/completions</h1>
    <p style="color:var(--muted); margin-top:0;">Minimalny formularz: wpisz tekst, wyślij, pokażemy surową odpowiedź JSON.</p>
    <div class="row">
      <textarea id="msg" placeholder="Napisz wiadomość…">cześć, podaj jedno zdanie o sobie</textarea>
    </div>
    <div class="row" style="margin-top:8px;">
      <button id="sendBtn">Wyślij</button>
      <div id="status" style="color:var(--muted); align-self:center;"></div>
    </div>
    <div class="log" id="log"></div>
  </div>

  <script>
    const msg = document.getElementById("msg");
    const log = document.getElementById("log");
    const statusEl = document.getElementById("status");
    const sendBtn = document.getElementById("sendBtn");

    async function send() {
      const text = msg.value.trim();
      if (!text) return;
      statusEl.textContent = "Wysyłam…";
      sendBtn.disabled = true;
      try {
        const resp = await fetch("/v1/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: [{ role: "user", content: text }] }),
        });
        const data = await resp.json();
        let content = "";
        if (data?.choices?.[0]?.message?.content) content = data.choices[0].message.content;
        else if (data?.choices?.[0]?.content) content = data.choices[0].content;
        log.textContent =
          "Status: " + resp.status + " " + resp.statusText + "\\n" +
          "Odpowiedź: " + (content || JSON.stringify(data, null, 2));
      } catch (e) {
        log.textContent = "Błąd: " + e;
      } finally {
        statusEl.textContent = "";
        sendBtn.disabled = false;
      }
    }
    sendBtn.onclick = send;
  </script>
</body>
</html>
