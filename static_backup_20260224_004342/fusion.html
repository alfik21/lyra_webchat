<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lyra + ChatGPT (fuzja widoków)</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin:0; padding:0; width:100%; height:100%; background:#0f172a; color:#e2e8f0; font-family: Inter, system-ui, sans-serif; }
    header { position:fixed; top:0; left:0; right:0; z-index:10; display:flex; gap:10px; align-items:center; padding:10px 14px; background:rgba(15,23,42,0.9); border-bottom:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(8px); }
    header a { color:#e2e8f0; text-decoration:none; font-weight:700; padding:6px 10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); }
    header a:hover { background:rgba(148,163,184,0.15); }
    header .hint { margin-left:auto; font-size:12px; color:#94a3b8; }
    main { position:absolute; top:58px; left:0; right:0; bottom:0; display:flex; gap:2px; padding:2px; box-sizing:border-box; }
    iframe { border:0; width:50%; height:100%; background:#0f172a; }
    @media (max-width: 900px) { iframe { width:100%; height:50%; } main { flex-direction:column; } }
  </style>
</head>
<body>
  <header>
    <a href="/">Czat Lyra</a>
    <a href="/voice.html">Voice UI</a>
    <a href="/tts-settings.html">👄 TTS</a>
    <a href="/app">Nowa strona</a>
    <a href="/chatgpt.html">ChatGPT zrzut</a>
    <span class="hint">Widok dzielony: Lyra po lewej, zrzut ChatGPT po prawej</span>

  <main>
    <iframe src="/" title="Lyra czat"></iframe>
    <iframe src="/chatgpt.html" title="ChatGPT zrzut"></iframe>
  </main>
